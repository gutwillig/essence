<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1814;
    --ink-2: #3d3a33;
    --ink-3: #6b6760;
    --ink-4: #9e9b95;
    --paper: #f5f2eb;
    --paper-2: #ece9e0;
    --paper-3: #e0dcd1;
    --gold: #b8964e;
    --gold-light: #d4af6e;
    --border: rgba(26,24,20,0.1);
    --border-strong: rgba(26,24,20,0.2);
    --radius: 4px;
    --radius-lg: 8px;
  }

  html { font-size: 16px; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── DARK MODE ── */
  .dark {
    --ink: #f0ede6;
    --ink-2: #d4cfc6;
    --ink-3: #9b9690;
    --ink-4: #6b6760;
    --paper: #1c1a17;
    --paper-2: #242018;
    --paper-3: #2e291f;
    --gold: #c9a55e;
    --gold-light: #d4b96e;
    --border: rgba(240,237,230,0.08);
    --border-strong: rgba(240,237,230,0.15);
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 0.5px solid var(--border-strong);
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.65rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    display: inline-block;
  }

  .nav-right {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  .nav-link {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--ink); }

  .theme-toggle {
    background: none;
    border: 0.5px solid var(--border-strong);
    border-radius: 99px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-3);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { color: var(--ink); border-color: var(--gold); }

  /* ── HERO ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.75rem 2rem 2rem;
    text-align: center;
    transition: all 0.5s ease;
  }
  .hero.has-result {
    padding: 2.5rem 2rem 1.5rem;
    justify-content: flex-start;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s ease forwards;
  }
  .hero-title em {
    font-style: italic;
    color: var(--ink-2);
  }

  /* ── SEARCH ── */
  .search-wrap {
    width: 100%;
    max-width: 560px;
    opacity: 0;
    animation: fadeUp 0.6s 0.4s ease forwards;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--paper);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(26,24,20,0.06);
  }
  .search-box:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,150,78,0.12), 0 2px 8px rgba(26,24,20,0.06);
  }

  .search-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--ink);
    padding: 1rem 1.25rem;
    outline: none;
  }
  .search-box input::placeholder { color: var(--ink-4); }

  .search-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.875rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-btn:hover { background: var(--ink-2); }
  .search-btn:disabled { background: var(--ink-3); cursor: not-allowed; }

  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1.25rem;
  }
  .suggestion {
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--ink-3);
    background: var(--paper-2);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .suggestion:hover {
    background: var(--paper-3);
    color: var(--ink);
    border-color: var(--border-strong);
  }

  /* ── DEPTH TABS ── */
  .depth-row {
    display: flex;
    gap: 0;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    overflow: hidden;
    width: fit-content;
    margin: 0 auto 1.5rem;
  }
  .depth-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    background: var(--paper);
    border: none;
    border-right: 0.5px solid var(--border-strong);
    color: var(--ink-4);
    cursor: pointer;
    transition: all 0.15s;
  }
  .depth-tab:last-child { border-right: none; }
  .depth-tab:hover { background: var(--paper-2); color: var(--ink-2); }
  .depth-tab.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* ── RESULT AREA ── */
  #result-area {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: none;
  }
  #result-area.visible { display: block; }

  .result-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .result-meta {
    font-size: 0.8rem;
    color: var(--ink-4);
    letter-spacing: 0.05em;
  }

  .result-divider {
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin: 0.75rem 0 1.75rem;
    opacity: 0.6;
  }

  /* ── ESSENCE BOX ── */
  .essence-block {
    background: var(--paper-2);
    border: 0.5px solid var(--border-strong);
    border-left: 3px solid var(--gold);
    border-radius: var(--radius-lg);
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.4s ease;
  }
  .essence-eyebrow {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .essence-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--ink);
  }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.4s 0.1s ease both;
  }
  .info-card {
    background: var(--paper);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 1rem 1.125rem;
  }
  .info-card-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 0.5rem;
  }
  .info-card-text {
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--ink-2);
  }

  /* ── CONNECTIONS ── */
  .connections-section {
    margin-bottom: 1.5rem;
    animation: fadeUp 0.4s 0.2s ease both;
  }
  .connections-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 0.875rem;
  }
  .connections-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .connection-tag {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--ink-2);
    background: var(--paper);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .connection-tag:hover {
    background: var(--paper-3);
    border-color: var(--gold);
    color: var(--ink);
  }
  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── LOADING ── */
  .loading-state {
    text-align: center;
    padding: 3rem 1rem;
    animation: fadeUp 0.3s ease;
  }
  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--paper-3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  .loading-text {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-4);
  }
  .loading-sub {
    font-size: 0.75rem;
    color: var(--ink-4);
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* ── ERROR ── */
  .error-box {
    background: #fdf2f2;
    border: 0.5px solid #e5b4b4;
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    font-size: 0.875rem;
    color: #7a3a3a;
    line-height: 1.6;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 0.5px solid var(--border);
    padding: 1.25rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text {
    font-size: 0.75rem;
    color: var(--ink-4);
    letter-spacing: 0.05em;
  }
  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    color: var(--ink-3);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── RESULT FADE ── */
  .result-fade {
    animation: fadeUp 0.5s ease both;
  }

  /* ── QUOTE STYLE ── */
  blockquote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--ink-2);
    border-left: 2px solid var(--gold);
    padding-left: 1.25rem;
    margin: 1rem 0;
  }

  /* ── CATEGORY VIEW ── */
  .category-view {
    display: none;
    padding: 2.5rem 2rem 4rem;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    animation: fadeUp 0.35s ease;
  }
  .category-view.visible { display: block; }

  .category-back {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-4);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
    margin-bottom: 1.25rem;
  }
  .category-back:hover { color: var(--ink); }

  .category-view-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.25rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .category-view-sub {
    font-size: 0.8rem;
    color: var(--ink-4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 8px;
  }
  .category-item {
    background: var(--paper);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 0.75rem 1rem;
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--ink-2);
    font-weight: 300;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }
  .category-item:hover {
    background: var(--paper-2);
    border-color: var(--gold);
    color: var(--ink);
    transform: translateY(-1px);
  }

  /* ── ELI5 INLINE ── */
  .eli5-inline-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 1.1rem;
    background: var(--paper-3);
    border: 0.5px solid var(--border-strong);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .eli5-inline-btn:hover {
    background: var(--paper);
    border-color: var(--gold);
    color: var(--ink);
  }

  /* ── DISAMBIGUATION ── */
  .disambig-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.4s ease;
  }
  .disambig-option {
    display: flex;
    align-items: center;
    background: var(--paper);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 0.875rem 1.25rem;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    width: 100%;
  }
  .disambig-option:hover {
    background: var(--paper-2);
    border-color: var(--gold);
    transform: translateX(2px);
  }
  .disambig-label {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--ink);
    margin-right: 8px;
  }
  .disambig-hint {
    font-size: 0.8rem;
    color: var(--ink-4);
    font-weight: 300;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 4px; }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="goHome()" style="cursor:pointer;">
    <span class="logo-dot"></span>
    Essence
  </div>
  <div class="nav-right">
    <span class="nav-link" onclick="showCategory('films')">Films</span>
    <span class="nav-link" onclick="showCategory('books')">Books</span>
    <span class="nav-link" onclick="showCategory('concepts')">Concepts</span>
    <span class="nav-link" onclick="showCategory('people')">People</span>
    <span class="nav-link" onclick="showCategory('events')">Events</span>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</nav>

<main>
  <div class="hero" id="hero">
    <h1 class="hero-title">What's the point of <em>anything?</em><br>Find the Essence.</h1>
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Try a film, book, idea, person, concept…" autocomplete="off" />
        <button class="search-btn" id="search-btn" onclick="getEssence()">
          Distil
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="suggestions" id="suggestions">
        <span class="suggestion" onclick="searchFor('Stoicism')">Stoicism</span>
        <span class="suggestion" onclick="searchFor('The Great Gatsby')">The Great Gatsby</span>
        <span class="suggestion" onclick="searchFor('The Sopranos')">The Sopranos</span>
        <span class="suggestion" onclick="searchFor('Nikola Tesla')">Nikola Tesla</span>
        <span class="suggestion" onclick="searchFor('Bitcoin')">Bitcoin</span>
        <span class="suggestion" onclick="searchFor('The Dark Knight')">The Dark Knight</span>
      </div>
    </div>

    <div id="depth-selector" style="margin-top: 1.5rem;">
      <div class="depth-row">
        <button class="depth-tab active" data-depth="tldr" onclick="selectDepth(this)">TLDR</button>
        <button class="depth-tab" data-depth="3min" onclick="selectDepth(this)">3 min</button>
        <button class="depth-tab" data-depth="deep" onclick="selectDepth(this)">Deep dive</button>
      </div>
    </div>
  </div>

  <div id="category-view" class="category-view"></div>

  <div id="result-area">
    <div id="result-content"></div>
  </div>
</main>

<footer></footer>

<script>
  const categoryData = {
    films: {
      label: 'Films',
      sub: '25 essential films',
      items: ['The Godfather','Pulp Fiction','Schindler\'s List','2001: A Space Odyssey','The Dark Knight','Parasite','Fight Club','Inception','Blade Runner','Spirited Away','Eternal Sunshine of the Spotless Mind','No Country for Old Men','Apocalypse Now','The Silence of the Lambs','Citizen Kane','Taxi Driver','There Will Be Blood','The Shawshank Redemption','Mulholland Drive','Rear Window','City of God','Amélie','Pan\'s Labyrinth','In the Mood for Love','Stalker']
    },
    books: {
      label: 'Books',
      sub: '25 essential books',
      items: ['1984','Crime and Punishment','The Great Gatsby','To Kill a Mockingbird','One Hundred Years of Solitude','Moby-Dick','The Brothers Karamazov','Dune','Beloved','The Trial','Blood Meridian','Catch-22','Middlemarch','Anna Karenina','Infinite Jest','Don Quixote','The Master and Margarita','Lolita','The Road','A Brief History of Time','Sapiens','The Stranger','Things Fall Apart','The Remains of the Day','Giovanni\'s Room']
    },
    concepts: {
      label: 'Concepts',
      sub: '25 essential concepts',
      items: ['Stoicism','Existentialism','Quantum Mechanics','Evolution','The Trolley Problem','Cognitive Dissonance','String Theory','The Butterfly Effect','Nihilism','Entropy','The Prisoner\'s Dilemma','The Fermi Paradox','The Social Contract','Zen Buddhism','Determinism','The Allegory of the Cave','Utilitarianism','Natural Selection','The Overton Window','Sunk Cost Fallacy','Chaos Theory','Emergence','Moral Relativism','The Dunning-Kruger Effect','Solipsism']
    },
    people: {
      label: 'People',
      sub: '25 essential figures',
      items: ['Albert Einstein','Leonardo da Vinci','Nikola Tesla','Marie Curie','Friedrich Nietzsche','Sigmund Freud','Karl Marx','Alan Turing','Simone de Beauvoir','James Baldwin','Frida Kahlo','Ada Lovelace','Marcus Aurelius','Hannah Arendt','Virginia Woolf','Galileo Galilei','Cleopatra','Genghis Khan','Charles Darwin','Isaac Newton','Joan of Arc','Mary Shelley','Immanuel Kant','Malcolm X','Socrates']
    },
    events: {
      label: 'Events',
      sub: '25 essential events',
      items: ['World War II','The French Revolution','The Moon Landing','The Cold War','The Black Death','The Renaissance','The Industrial Revolution','The Fall of Rome','The Holocaust','The American Civil War','The Cuban Missile Crisis','The Manhattan Project','The Protestant Reformation','The Enlightenment','The Space Race','The Great Depression','D-Day','The Arab Spring','The Rwandan Genocide','The Silk Road','The Battle of Thermopylae','Chernobyl','The Age of Exploration','The Boston Tea Party','The Treaty of Westphalia']
    }
  };

  function showCategory(name) {
    const data = categoryData[name];
    if (!data) return;
    document.getElementById('hero').style.display = 'none';
    document.getElementById('result-area').classList.remove('visible');
    const view = document.getElementById('category-view');
    view.innerHTML = `
      <button class="category-back" onclick="goHome()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
      <div class="category-view-title">${data.label}</div>
      <div class="result-divider"></div>
      <div class="category-view-sub">${data.sub}</div>
      <div class="category-grid">
        ${data.items.map(item => `<button class="category-item" onclick="searchFromCategory('${item.replace(/'/g, "\\'")}')">${item}</button>`).join('')}
      </div>
    `;
    view.classList.add('visible');
  }

  function goHome() {
    isLoading = false;
    document.getElementById('category-view').classList.remove('visible');
    document.getElementById('result-area').classList.remove('visible');
    const hero = document.getElementById('hero');
    hero.style.display = '';
    hero.classList.remove('has-result');
    document.getElementById('search-input').value = '';
    document.getElementById('suggestions').style.display = '';
    document.getElementById('search-btn').disabled = false;
    document.getElementById('search-btn').innerHTML = `Distil
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    currentQuery = '';
  }

  function searchFromCategory(term) {
    goHome();
    setTimeout(() => searchFor(term), 50);
  }

  let currentDepth = 'tldr';
  let currentQuery = '';
  let isLoading = false;

  const depthLabels = {
    tldr: 'TLDR',
    eli5: 'ELI5',
    '3min': '3-minute read',
    deep: 'Full deep dive'
  };

  const depthTokens = {
    tldr: 500,
    eli5: 700,
    '3min': 1400,
    deep: 4500
  };

  function selectDepth(btn) {
    document.querySelectorAll('.depth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentDepth = btn.dataset.depth;
    if (currentQuery) getEssence(true);
  }

  function searchFor(term) {
    document.getElementById('search-input').value = term;
    getEssence();
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') getEssence();
  });

  function showLoading() {
    const area = document.getElementById('result-area');
    area.classList.add('visible');
    document.getElementById('result-content').innerHTML = `
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Distilling the essence</div>
        <div class="loading-sub">Finding what truly matters…</div>
      </div>
    `;
  }

  async function getEssence(depthChange = false) {
    const query = document.getElementById('search-input').value.trim();
    if (!query || isLoading) return;

    currentQuery = query;
    isLoading = true;

    const hero = document.getElementById('hero');
    hero.classList.add('has-result');
    document.getElementById('suggestions').style.display = 'none';
    document.getElementById('search-btn').disabled = true;
    document.getElementById('search-btn').innerHTML = `
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="animation:spin 0.8s linear infinite">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="20" stroke-dashoffset="5"/>
      </svg>`;

    showLoading();

    const depthInstructions = {
      tldr: `Two sentences maximum. The absolute irreducible core: what it is and the single most important thing to know. No context, no fluff — just the sharpest possible takeaway.`,
      eli5: `Explain it like I'm 5 years old. One short paragraph (3-4 sentences). Super simple language, no jargon. Make a child understand the core idea.`,
      '3min': `Give a thorough 3-minute read. Three to four paragraphs. Cover the core idea, why it exists, why it matters, and one genuinely interesting angle. Educated general audience, conversational but intelligent tone.`,
      deep: `Full deep dive. Eight to twelve rich, dense paragraphs of substantial prose. This must be meaningfully longer and more thorough than a 3-minute summary. Cover everything: origins and full historical context, the complete core idea with all its nuances, every major debate and criticism, cultural and intellectual impact across multiple domains, surprising lesser-known angles, the strongest counterarguments, and the lasting legacy. Leave nothing important out. Assume a highly intelligent reader who wants the complete picture. Engaging literary prose, not bullet points.`
    };

    const systemPrompt = `You are Essence — a brilliant knowledge distiller. Your job is to take any topic and extract its irreducible core with clarity, elegance, and insight. You respond ONLY in valid JSON — no markdown, no backticks, no preamble.

FIRST — check if the query is genuinely ambiguous: does it have multiple well-known, meaningfully distinct interpretations? (Examples: "Monarch" → royalty vs. butterfly; "Gone with the Wind" → novel vs. film; "Mercury" → planet vs. element vs. Roman god vs. band; "The Office" → US vs. UK version). If so, return ONLY:
{
  "type": "disambiguation",
  "prompt": "Short clarifying question, e.g. 'Which Monarch did you mean?'",
  "alternatives": [
    { "label": "Specific display name", "hint": "One-phrase clarification", "type": "film|book|concept|person|event" }
  ]
}

If not ambiguous, return:
{
  "type": "result",
  "title": "Clean display title",
  "meta": "Brief category descriptor e.g. 'Film · 1994 · Frank Darabont' or 'Philosophy · Ancient Greece' or 'Physics · Quantum Theory'",
  "essence": "The main distilled explanation based on depth level",
  "the_point": "One sentence: what's the deeper point or why does this matter?",
  "why_it_matters": "One sentence: real-world relevance or lasting impact",
  "the_debate": "One sentence: the most interesting tension, controversy, or open question",
  "connections": [
    {"label": "Connection name", "type": "film|book|concept|person|event", "why": "One phrase: how it connects"}
  ]
}

connections should have 4-6 items — other works, ideas, or figures that share the same essential idea.`;

    const userPrompt = `Topic: "${query}"
Depth: ${depthLabels[currentDepth]}
Instruction: ${depthInstructions[currentDepth]}`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000);

    try {
      const response = await fetch('/api/essence', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: depthTokens[currentDepth] || 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        }),
        signal: controller.signal
      });

      clearTimeout(timeout);
      const data = await response.json();

      if (!response.ok) throw new Error(data.error?.message || 'API error');

      const raw = data.content[0]?.text || '';
      let parsed;
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
      } catch {
        throw new Error('Could not parse response. Please try again.');
      }

      if (parsed.type === 'disambiguation') {
        renderDisambiguation(parsed);
      } else {
        renderResult(parsed);
      }

    } catch (err) {
      clearTimeout(timeout);
      const msg = err.name === 'AbortError'
        ? 'Request timed out — try a shorter depth or try again.'
        : (err.message || 'Please try again in a moment.');
      document.getElementById('result-content').innerHTML = `
        <div class="error-box">
          <strong>Something went wrong.</strong><br>${msg}
        </div>
      `;
    } finally {
      isLoading = false;
      document.getElementById('search-btn').disabled = false;
      document.getElementById('search-btn').innerHTML = `Distil
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;
    }
  }

  const connColors = {
    film: '#7F77DD',
    book: '#1D9E75',
    concept: '#D85A30',
    person: '#378ADD',
    event: '#BA7517'
  };

  const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  const sunIcon = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    document.getElementById('theme-icon').innerHTML = isDark ? sunIcon : moonIcon;
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
      document.documentElement.classList.add('dark');
      document.getElementById('theme-icon').innerHTML = sunIcon;
    }
  })();

  function tryELI5() {
    currentDepth = 'eli5';
    getEssence(true);
  }

  function renderDisambiguation(d) {
    const alts = (d.alternatives || []).map(a => {
      const color = connColors[a.type] || '#888780';
      return `<button class="disambig-option" onclick="searchFor('${a.label.replace(/'/g,"\\'")}')">
        <span class="conn-dot" style="background:${color}; flex-shrink:0;"></span>
        <span class="disambig-label">${a.label}</span>
        <span class="disambig-hint">— ${a.hint}</span>
      </button>`;
    }).join('');

    document.getElementById('result-content').innerHTML = `
      <div class="result-fade">
        <div class="result-header">
          <div class="result-title" style="font-size:1.5rem;">${d.prompt || 'Which did you mean?'}</div>
        </div>
        <div class="result-divider"></div>
        <div class="disambig-list">${alts}</div>
      </div>
    `;
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderResult(d) {
    const connections = (d.connections || []).map(c => {
      const color = connColors[c.type] || '#888780';
      return `<span class="connection-tag" onclick="searchFor('${c.label.replace(/'/g,"\\'")}')">
        <span class="conn-dot" style="background:${color}"></span>
        ${c.label}
        <span style="color:var(--ink-4); font-size:0.72rem;">— ${c.why}</span>
      </span>`;
    }).join('');

    document.getElementById('result-content').innerHTML = `
      <div class="result-fade">
        <div class="result-header">
          <div class="result-title">${d.title || currentQuery}</div>
          <div class="result-meta">${d.meta || ''}</div>
        </div>
        <div class="result-divider"></div>

        <div class="essence-block">
          <div class="essence-eyebrow">The essence · ${depthLabels[currentDepth]}</div>
          <div class="essence-text">${d.essence || ''}</div>
          ${currentDepth === 'tldr' ? `<button class="eli5-inline-btn" onclick="tryELI5()">🤔 Still lost? ELI5 it</button>` : ''}
        </div>

        <div class="cards-grid">
          <div class="info-card">
            <div class="info-card-label">The point</div>
            <div class="info-card-text">${d.the_point || ''}</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">Why it matters</div>
            <div class="info-card-text">${d.why_it_matters || ''}</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">The debate</div>
            <div class="info-card-text">${d.the_debate || ''}</div>
          </div>
        </div>

        <div class="connections-section">
          <div class="connections-label">This idea echoes in</div>
          <div class="connections-list">${connections}</div>
        </div>

      </div>
    `;
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
